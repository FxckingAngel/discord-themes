name: Auto-generate README on merge

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'

jobs:
  generate:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.README_PUSH_TOKEN }}

      - name: Generate README
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/generate-readme.ps1 -NoAuthorPrompt

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && echo "No changes to README." || (git add README.md && git commit -m "chore: auto-update README [skip ci]" && git push)
        shell: bash

      - name: Notify Discord on failure
        if: failure()
        env:
          HOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SHA:  ${{ github.sha }}
          RUN:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n \
            --arg title "README generation failed" \
            --arg desc  "The auto-README workflow failed on \`main\`. The README may be out of date — re-run \`generate-readme\` or push again." \
            --arg sha   "${SHA:0:7}" \
            --arg run   "$RUN" \
            --arg ts    "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds:[{
              title: $title,
              description: $desc,
              color: 15105570,
              fields: [
                {name:"Commit", value:("`"+$sha+"`"), inline:true},
                {name:"Logs",   value:("[View run]("+$run+")"),  inline:true}
              ],
              footer:    {text:"discord-themes • github-actions"},
              timestamp: $ts
            }]}' \
          | curl -s -X POST "$HOOK" -H "Content-Type: application/json" -d @-
