name: Auto-generate README on merge

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'

jobs:
  generate:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.README_PUSH_TOKEN }}

      - name: Generate README
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/generate-readme.ps1 -NoAuthorPrompt

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && echo "No changes to README." || (git add README.md && git commit -m "chore: auto-update README [skip ci]" && git push)
        shell: bash

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.README_PUSH_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: 'Post-merge README generation failed',
              body:  `The \`generate\` workflow failed after a push to main.\n\nCommit: \`${context.sha}\`\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\nREADME may be out of date — manually re-run or trigger \`workflow_dispatch\`.`,
              labels: ['bug'],
            });
