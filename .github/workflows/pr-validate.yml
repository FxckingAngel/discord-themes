name: Validate and auto-merge PRs

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    outputs:
      safe_to_merge: ${{ steps.check.outputs.safe_to_merge }}
    steps:
      - name: Check PR changes
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const PROTECTED_FILES = ['README.md', 'theme-authors.json', 'themecmd.cmd', 'THEMECMD.md'];
            const PROTECTED_DIRS  = ['.github/', 'scripts/'];

            const prAuthor = context.payload.pull_request.user.login;

            // Read theme-authors.json from main (authoritative ownership data)
            const { data: authorsFile } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'theme-authors.json',
              ref: 'main'
            });
            const authorsData = JSON.parse(
              Buffer.from(authorsFile.content, 'base64').toString('utf8').replace(/^\uFEFF/, '')
            );
            const folderOwners = authorsData.folders || {};

            // Get all PR files (paginated)
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            // Each issue: { title, what, why, fix }
            const issues = [];

            for (const file of files) {
              // Protected root files and directories
              if (PROTECTED_FILES.includes(file.filename) ||
                  PROTECTED_DIRS.some(d => file.filename.startsWith(d))) {
                if (file.filename === 'README.md') {
                  issues.push({
                    title: '`README.md` cannot be edited in PRs',
                    what:  `You ${file.status} \`README.md\`.`,
                    why:   'The README is auto-generated from your theme files every time a PR merges. Any manual edits you make here will be overwritten immediately.',
                    fix:   'Remove `README.md` from your PR. If you want something to change in the README, update your theme\'s CSS metadata (the `@name`, `@description`, `@author`, etc. comment block at the top of your `.css` file) and the README will reflect it on merge.',
                  });
                } else {
                  issues.push({
                    title: `\`${file.filename}\` is a protected file`,
                    what:  `You ${file.status} \`${file.filename}\`.`,
                    why:   'This file is managed exclusively by the repo owner and cannot be changed through pull requests.',
                    fix:   `Remove \`${file.filename}\` from your PR. If you believe a change here is necessary, open an issue and describe what you need.`,
                  });
                }
                continue;
              }

              // Root-level files not already covered
              const topFolder = file.filename.includes('/') ? file.filename.split('/')[0] : null;
              if (!topFolder) {
                issues.push({
                  title: `\`${file.filename}\` is a root-level file`,
                  what:  `You ${file.status} \`${file.filename}\` at the repository root.`,
                  why:   'Root-level files are managed by the repo owner only.',
                  fix:   `Remove \`${file.filename}\` from your PR. All theme files must live inside a theme folder (e.g. \`My Themes/my-theme/\`).`,
                });
                continue;
              }

              // Folder ownership check — prefer `github` field, fall back to `author`
              if (folderOwners[topFolder]) {
                const entry        = folderOwners[topFolder];
                const folderGithub = (entry.github || entry.author || '').toLowerCase();
                const displayName  = entry.author || entry.github || topFolder;
                if (folderGithub !== prAuthor.toLowerCase()) {
                  issues.push({
                    title: `\`${topFolder}/\` belongs to **${displayName}**`,
                    what:  `You ${file.status} \`${file.filename}\`, which is inside \`${topFolder}/\` — a folder owned by **${displayName}**, not you.`,
                    why:   'Contributors can only add, edit, or delete files within their own theme folder. Touching someone else\'s folder is not allowed.',
                    fix:   `Remove any changes to files inside \`${topFolder}/\` from your PR. If you want to suggest a change to **${displayName}**'s theme, open an issue tagging them instead.`,
                  });
                }
              } else {
                // Unclaimed folder — only additions allowed
                if (file.status !== 'added') {
                  issues.push({
                    title: `\`${topFolder}/\` is not a registered folder`,
                    what:  `You ${file.status} \`${file.filename}\` inside \`${topFolder}/\`, which isn't registered in \`theme-authors.json\`.`,
                    why:   'Modifying or deleting files in an unregistered folder isn\'t allowed through auto-merge because ownership can\'t be verified.',
                    fix:   `Only **add** new files to \`${topFolder}/\`. If you need to edit or delete existing files there, contact the repo owner to get the folder registered under your name first.`,
                  });
                }
              }
            }

            if (issues.length > 0) {
              const sections = issues.map((issue, i) => [
                `### ${i + 1}. ${issue.title}`,
                `**What happened:** ${issue.what}`,
                `**Why this is blocked:** ${issue.why}`,
                `**How to fix it:** ${issue.fix}`,
              ].join('\n'));

              const body = [
                `## Auto-merge blocked (${issues.length} issue${issues.length > 1 ? 's' : ''})`,
                '',
                'Fix the issue(s) below, then push to your branch — the check will re-run automatically.',
                '',
                '---',
                '',
                sections.join('\n\n---\n\n'),
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.setFailed(`PR blocked: ${issues.length} issue(s) found.`);
            } else {
              core.setOutput('safe_to_merge', 'true');
            }

  auto-merge:
    needs: validate
    if: needs.validate.outputs.safe_to_merge == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --repo "${{ github.repository }}"

  generate-readme:
    needs: auto-merge
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.README_PUSH_TOKEN }}

      - name: Generate README
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/generate-readme.ps1 -NoAuthorPrompt

      - name: Commit updated README
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && echo "README unchanged." || (git add README.md && git commit -m "chore: auto-update README [skip ci]" && git push)
