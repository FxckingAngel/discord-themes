name: Validate and auto-merge PRs

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    outputs:
      safe_to_merge:  ${{ steps.check.outputs.safe_to_merge }}
      new_folders:    ${{ steps.check.outputs.new_folders }}
      is_collaborator: ${{ steps.check.outputs.is_collaborator }}
      issues_json:    ${{ steps.check.outputs.issues_json }}
    steps:
      - name: Check PR changes
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const PROTECTED_FILES = ['README.md', 'theme-authors.json', 'themecmd.cmd', 'THEMECMD.md'];
            const PROTECTED_DIRS  = ['.github/', 'scripts/'];

            const prAuthor = context.payload.pull_request.user.login;
            const prNum    = context.issue.number;

            const { data: authorsFile } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'theme-authors.json',
              ref: 'main'
            });
            const authorsData = JSON.parse(
              Buffer.from(authorsFile.content, 'base64').toString('utf8').replace(/^\uFEFF/, '')
            );
            const folderOwners = authorsData.folders || {};

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNum,
            });

            const issues       = [];
            const newFolderSet = new Set();
            const reportedOwnershipIssues = new Set();
            const reportedFolderIssues    = new Set();

            const ALLOWED_EXTS = ['.css', '.md', '.png', '.gif', '.jpg', '.jpeg', '.webp', '.svg'];

            function validateStructure(filename, topFolder) {
              const parts  = filename.split('/');
              const depth  = parts.length;
              const fname  = parts[parts.length - 1];
              const dotIdx = fname.lastIndexOf('.');
              const ext    = dotIdx >= 0 ? fname.slice(dotIdx).toLowerCase() : '';
              if (ext && !ALLOWED_EXTS.includes(ext)) {
                issues.push({
                  title: `\`${fname}\` — file type not allowed`,
                  what:  `You added \`${fname}\` (\`${ext}\`) to \`${topFolder}/\`.`,
                  why:   `Only these file types are permitted in contributor folders: ${ALLOWED_EXTS.join(', ')}.`,
                  fix:   `Remove \`${filename}\` from your PR. Contact the repo owner if you need a different file type.`,
                });
              } else if (ext === '.css' && depth === 2) {
                issues.push({
                  title: `\`${fname}\` — CSS must be inside a theme subfolder`,
                  what:  `You placed \`${fname}\` directly inside \`${topFolder}/\` instead of a theme subfolder.`,
                  why:   'CSS files must live inside their own named theme folder, not at the root of your contributor folder.',
                  fix:   `Move it to \`${topFolder}/Theme Name/${fname}\`.`,
                });
              } else if (ext === '.md' && depth > 2) {
                issues.push({
                  title: `\`${fname}\` — markdown must be at contributor folder root`,
                  what:  `You placed a \`.md\` file inside a theme subfolder (\`${filename}\`).`,
                  why:   'Markdown files are only allowed directly in your contributor folder root, not inside theme subfolders.',
                  fix:   `Move it to \`${topFolder}/AUTHOR.md\`.`,
                });
              } else if (ext === '.md' && depth === 2 && fname !== 'AUTHOR.md') {
                issues.push({
                  title: `\`${fname}\` — markdown file must be named AUTHOR.md`,
                  what:  `You added a markdown file named \`${fname}\` to your contributor folder.`,
                  why:   'Only one markdown file is allowed per contributor folder, and it must be named exactly \`AUTHOR.md\`.',
                  fix:   `Rename it to \`${topFolder}/AUTHOR.md\`.`,
                });
              } else if (ext !== '.css' && ext !== '.md' && depth === 2) {
                issues.push({
                  title: `\`${fname}\` — images must be inside a theme subfolder`,
                  what:  `You placed \`${fname}\` directly in your contributor folder root.`,
                  why:   'Image files must live inside a theme subfolder, not at the contributor folder root.',
                  fix:   `Move it to \`${topFolder}/Theme Name/${fname}\`.`,
                });
              }
            }

            for (const file of files) {
              if (PROTECTED_FILES.includes(file.filename) ||
                  PROTECTED_DIRS.some(d => file.filename.startsWith(d))) {
                if (file.filename === 'README.md') {
                  issues.push({
                    title: '`README.md` cannot be edited in PRs',
                    what:  `You ${file.status} \`README.md\`.`,
                    why:   'The README is auto-generated from your theme files every time a PR merges. Manual edits will be overwritten immediately.',
                    fix:   'Remove `README.md` from your PR. To change what appears in the README, update your theme\'s CSS metadata (`@name`, `@description`, `@author`, etc.) and the README will reflect it on merge.',
                  });
                } else {
                  issues.push({
                    title: `\`${file.filename}\` is a protected file`,
                    what:  `You ${file.status} \`${file.filename}\`.`,
                    why:   'This file is managed exclusively by the repo owner and cannot be changed through pull requests.',
                    fix:   `Remove \`${file.filename}\` from your PR. If you believe a change is necessary, open an issue describing what you need.`,
                  });
                }
                continue;
              }

              const topFolder = file.filename.includes('/') ? file.filename.split('/')[0] : null;
              if (!topFolder) {
                issues.push({
                  title: `\`${file.filename}\` is a root-level file`,
                  what:  `You ${file.status} \`${file.filename}\` at the repository root.`,
                  why:   'Root-level files are managed by the repo owner only.',
                  fix:   `Remove \`${file.filename}\` from your PR. All theme files must live inside a theme folder.`,
                });
                continue;
              }

              if (folderOwners[topFolder]) {
                const entry        = folderOwners[topFolder];
                const folderGithub = (entry.github || entry.author || '').toLowerCase();
                const displayName  = entry.author || entry.github || topFolder;
                if (folderGithub !== prAuthor.toLowerCase()) {
                  if (!reportedOwnershipIssues.has(topFolder)) {
                    reportedOwnershipIssues.add(topFolder);
                    issues.push({
                      title: `\`${topFolder}/\` belongs to **${displayName}**`,
                      what:  `You modified files inside \`${topFolder}/\`, which is owned by **${displayName}**, not you.`,
                      why:   'Contributors can only add, edit, or delete files within their own theme folder.',
                      fix:   `Remove any changes to \`${topFolder}/\`. If you want to suggest a change to **${displayName}**'s theme, open an issue tagging them instead.`,
                    });
                  }
                  continue;
                }
                validateStructure(file.filename, topFolder);
              } else {
                // Check if this is a rename FROM the contributor's own registered folder
                const prevFolder = (file.status === 'renamed' && file.previous_filename)
                  ? file.previous_filename.split('/')[0]
                  : null;
                const prevEntry = prevFolder ? folderOwners[prevFolder] : null;
                const isOwnedRename = prevEntry &&
                  (prevEntry.github || prevEntry.author || '').toLowerCase() === prAuthor.toLowerCase();

                if (isOwnedRename || file.status === 'added') {
                  if (!newFolderSet.has(topFolder)) {
                    newFolderSet.add(topFolder);
                    // Enforce folder naming convention once per new folder
                    if (!topFolder.endsWith(' Themes')) {
                      const suggestedName = topFolder.endsWith(' Theme')
                        ? topFolder + 's'
                        : topFolder + ' Themes';
                      issues.push({
                        title: `\`${topFolder}/\` — folder name must end with " Themes"`,
                        what:  `Your contributor folder is named \`${topFolder}\`.`,
                        why:   'All contributor folders must follow the naming convention, e.g. "Korone Themes", "Silver Themes".',
                        fix:   `Rename your folder to \`${suggestedName}\`.`,
                      });
                    }
                  }
                  validateStructure(file.filename, topFolder);
                } else if (!reportedFolderIssues.has(topFolder)) {
                  reportedFolderIssues.add(topFolder);
                  issues.push({
                    title: `\`${topFolder}/\` is not a registered folder`,
                    what:  `You ${file.status} files inside \`${topFolder}/\`, which isn't registered in \`theme-authors.json\`.`,
                    why:   'Modifying or deleting files in an unregistered folder isn\'t allowed because ownership can\'t be verified.',
                    fix:   `Only **add** new files to \`${topFolder}/\`. To register your folder, contact the repo owner.`,
                  });
                }
              }
            }

            // CSS URL validation — all image urls must be hosted in this repo
            const REPO_RAW_PREFIX = 'https://raw.githubusercontent.com/Silverfox0338/discord-themes/';
            const SKIP_URL_HOSTS  = ['fonts.googleapis.com', 'fonts.gstatic.com'];

            const cssToCheck = files.filter(f => {
              const parts  = f.filename.split('/');
              const dotIdx = f.filename.lastIndexOf('.');
              const ext    = dotIdx >= 0 ? f.filename.slice(dotIdx).toLowerCase() : '';
              return (f.status === 'added' || f.status === 'modified') && ext === '.css' && parts.length >= 3;
            });

            for (const cssFile of cssToCheck) {
              let content;
              try {
                const { data: fileData } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  path:  cssFile.filename,
                  ref:   context.payload.pull_request.head.sha,
                });
                content = Buffer.from(fileData.content, 'base64').toString('utf8');
              } catch (_) { continue; }

              const badUrls = [];
              for (const line of content.split('\n')) {
                if (line.trim().startsWith('@import')) continue;
                for (const match of line.matchAll(/url\(\s*['"]?(https?:\/\/[^'"\s)]+)['"]?\s*\)/gi)) {
                  const url = match[1];
                  if (url.startsWith('data:')) continue;
                  try {
                    const host = new URL(url).hostname;
                    if (SKIP_URL_HOSTS.includes(host)) continue;
                  } catch (_) { continue; }
                  if (!url.startsWith(REPO_RAW_PREFIX)) badUrls.push(url);
                }
              }

              if (badUrls.length > 0) {
                const fname   = cssFile.filename.split('/').pop();
                const urlList = badUrls.slice(0, 3).map(u => `\`${u}\``).join(', ');
                const more    = badUrls.length > 3 ? ` (+${badUrls.length - 3} more)` : '';
                issues.push({
                  title: `\`${fname}\` — external image URL(s) detected`,
                  what:  `Found ${badUrls.length} external URL(s) in \`${cssFile.filename}\`: ${urlList}${more}.`,
                  why:   'All images referenced in theme CSS must be hosted in this repository. External URLs (e.g. Imgur) are not permitted.',
                  fix:   `Upload your images to your theme subfolder and reference them via the raw GitHub URL:\n\`${REPO_RAW_PREFIX}main/Your%20Folder/Your%20Theme/image.png\``,
                });
              }
            }

            // GitHub collaborators AND registered contributors both get auto-merge
            let isGitHubCollaborator = false;
            try {
              await github.rest.repos.checkCollaborator({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                username: prAuthor,
              });
              isGitHubCollaborator = true;
            } catch (_) {}

            const isRegistered = Object.values(folderOwners).some(
              entry => (entry.github || '').toLowerCase() === prAuthor.toLowerCase()
            );

            const isCollaborator = isGitHubCollaborator || isRegistered;

            core.setOutput('is_collaborator', String(isCollaborator));
            core.setOutput('issues_json', JSON.stringify(issues.map(i => i.title)));

            if (issues.length > 0) {
              const sections = issues.map((issue, i) => [
                `### ${i + 1}. ${issue.title}`,
                `**What happened:** ${issue.what}`,
                `**Why this is blocked:** ${issue.why}`,
                `**How to fix it:** ${issue.fix}`,
              ].join('\n'));

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body: [
                  `## Auto-merge blocked (${issues.length} issue${issues.length > 1 ? 's' : ''})`,
                  '',
                  'Fix the issue(s) below, then push to your branch — the check will re-run automatically.',
                  '',
                  '---',
                  '',
                  sections.join('\n\n---\n\n'),
                ].join('\n'),
              });
              core.setFailed(`PR blocked: ${issues.length} issue(s) found.`);

            } else if (!isCollaborator) {
              core.setOutput('safe_to_merge', 'false');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: prNum,
                body: [
                  '## All checks passed — pending manual review',
                  '',
                  'Your PR looks good! Everything is structured correctly.',
                  '',
                  'Since you\'re not yet a registered collaborator, it won\'t auto-merge. The repo owner has been notified and will review your PR manually.',
                  '',
                  '> If this is your first submission, feel free to introduce yourself in an [issue](https://github.com/Silverfox0338/discord-themes/issues/new/choose) — collaborators get auto-merge on future PRs.',
                ].join('\n'),
              });

            } else {
              core.setOutput('safe_to_merge', 'true');
              if (newFolderSet.size > 0) {
                core.setOutput('new_folders', JSON.stringify(
                  [...newFolderSet].map(f => ({ folder: f, github: prAuthor }))
                ));
              }
            }

  auto-merge:
    needs: validate
    if: needs.validate.outputs.safe_to_merge == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --repo "${{ github.repository }}"

  update-authors:
    needs: [validate, auto-merge]
    if: needs.validate.outputs.new_folders != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.README_PUSH_TOKEN }}

      - name: Add new contributors to theme-authors.json
        uses: actions/github-script@v7
        env:
          NEW_FOLDERS: ${{ needs.validate.outputs.new_folders }}
        with:
          script: |
            const fs = require('fs');
            const newFolders = JSON.parse(process.env.NEW_FOLDERS);
            const raw  = fs.readFileSync('theme-authors.json', 'utf8').replace(/^\uFEFF/, '');
            const data = JSON.parse(raw);
            for (const { folder, github: ghLogin } of newFolders) {
              const { data: user } = await github.rest.users.getByUsername({ username: ghLogin });
              const displayName = user.name || ghLogin;
              data.folders[folder] = { author: displayName, github: ghLogin };
            }
            fs.writeFileSync('theme-authors.json', '\uFEFF' + JSON.stringify(data, null, 2) + '\n', 'utf8');

      - name: Commit updated theme-authors.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet theme-authors.json && echo "No changes." || \
            (git add theme-authors.json && git commit -m "chore: register new contributor(s) [skip ci]" && git push)

  generate-readme:
    needs: [auto-merge, update-authors]
    if: always() && needs.auto-merge.result == 'success'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.README_PUSH_TOKEN }}

      - name: Generate README
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/generate-readme.ps1 -NoAuthorPrompt

      - name: Commit updated README
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && echo "README unchanged." || \
            (git add README.md && git commit -m "chore: auto-update README [skip ci]" && git push)

  summarize:
    needs: [validate, auto-merge]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build notification payload
        uses: actions/github-script@v7
        env:
          IS_COLLABORATOR:   ${{ needs.validate.outputs.is_collaborator }}
          ISSUES_JSON:       ${{ needs.validate.outputs.issues_json }}
          VALIDATE_RESULT:   ${{ needs.validate.result }}
          AUTO_MERGE_RESULT: ${{ needs.auto-merge.result }}
        with:
          script: |
            const fs = require('fs');
            const isCollaborator    = process.env.IS_COLLABORATOR === 'true';
            const validateResult    = process.env.VALIDATE_RESULT;
            const autoMergeResult   = process.env.AUTO_MERGE_RESULT;
            const issues            = process.env.ISSUES_JSON ? JSON.parse(process.env.ISSUES_JSON) : [];

            let outcome;
            if (autoMergeResult === 'success') {
              outcome = 'auto_merged';
            } else if (validateResult === 'failure' && isCollaborator) {
              outcome = 'rejected_collaborator';
            } else if (validateResult === 'failure' && !isCollaborator) {
              outcome = 'rejected_unknown';
            } else if (validateResult === 'success' && !isCollaborator) {
              outcome = 'needs_review';
            } else {
              return; // Nothing to notify
            }

            const payload = {
              prNumber: context.payload.pull_request.number,
              prTitle:  context.payload.pull_request.title,
              prUrl:    context.payload.pull_request.html_url,
              prAuthor: context.payload.pull_request.user.login,
              outcome,
              issues,
            };

            fs.writeFileSync('notification.json', JSON.stringify(payload));

      - uses: actions/upload-artifact@v4
        with:
          name: pr-notification
          path: notification.json
          retention-days: 1
