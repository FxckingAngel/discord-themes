name: Post-run events

on:
  workflow_run:
    workflows: ["Validate and auto-merge PRs"]
    types: [completed]
  issues:
    types: [opened]

jobs:
  issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Send issue notification
        env:
          HOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          LABEL="${{ github.event.issue.labels[0].name }}"
          AUTHOR="${{ github.event.issue.user.login }}"
          TITLE="${{ github.event.issue.title }}"
          URL="${{ github.event.issue.html_url }}"
          NUM="${{ github.event.issue.number }}"

          case "$LABEL" in
            bug)
              COLOR=15158332
              BADGE="Bug Report"
              ;;
            suggestion)
              COLOR=3447003
              BADGE="Theme Suggestion"
              ;;
            *)
              COLOR=9807270
              BADGE="General"
              ;;
          esac

          jq -n \
            --arg title "New ${BADGE} — #${NUM}" \
            --arg desc  "**@${AUTHOR}** opened [issue #${NUM}: \"${TITLE}\"](${URL})" \
            --argjson color "$COLOR" \
            --arg url   "$URL" \
            '{"embeds":[{"title":$title,"description":$desc,"color":$color,"url":$url}]}' \
          | curl -s -X POST "$HOOK" -H "Content-Type: application/json" -d @-

  run:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Download payload
        uses: actions/download-artifact@v4
        id: download
        with:
          name: pr-notification
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Send notification
        if: steps.download.outcome == 'success'
        env:
          HOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          PAYLOAD=$(cat notification.json)
          OUTCOME=$(echo "$PAYLOAD" | jq -r '.outcome')
          PR_NUM=$(echo "$PAYLOAD"  | jq -r '.prNumber')
          PR_TITLE=$(echo "$PAYLOAD" | jq -r '.prTitle')
          PR_URL=$(echo "$PAYLOAD"  | jq -r '.prUrl')
          PR_AUTHOR=$(echo "$PAYLOAD" | jq -r '.prAuthor')
          ISSUE_LIST=$(echo "$PAYLOAD" | jq -r '.issues | map("• " + .) | join("\n")')

          case "$OUTCOME" in
            auto_merged)
              COLOR=3066993
              TITLE="PR Auto-Merged — #${PR_NUM}"
              DESC="**@${PR_AUTHOR}**'s [PR #${PR_NUM}: \"${PR_TITLE}\"](${PR_URL}) was automatically merged."
              ;;
            rejected_collaborator)
              COLOR=15127042
              TITLE="Trusted Contributor PR Blocked — #${PR_NUM}"
              DESC=$(printf '**@%s** (trusted contributor) submitted [PR #%s: "%s"](%s) but it was rejected.\n\n**Violations:**\n%s' \
                "$PR_AUTHOR" "$PR_NUM" "$PR_TITLE" "$PR_URL" "$ISSUE_LIST")
              ;;
            rejected_registered)
              COLOR=15127042
              TITLE="Registered Contributor PR Blocked — #${PR_NUM}"
              DESC=$(printf '**@%s** (registered, not yet trusted) submitted [PR #%s: "%s"](%s) but it was rejected.\n\n**Violations:**\n%s' \
                "$PR_AUTHOR" "$PR_NUM" "$PR_TITLE" "$PR_URL" "$ISSUE_LIST")
              ;;
            rejected_unknown)
              COLOR=15158332
              TITLE="Unknown User PR Rejected — #${PR_NUM}"
              DESC=$(printf '**@%s** (unregistered) submitted [PR #%s: "%s"](%s) and was rejected.\n\n**Violations:**\n%s' \
                "$PR_AUTHOR" "$PR_NUM" "$PR_TITLE" "$PR_URL" "$ISSUE_LIST")
              ;;
            needs_trust_approval)
              COLOR=16766720
              TITLE="PR Needs Trust Approval — #${PR_NUM}"
              DESC="**@${PR_AUTHOR}** is registered but not yet trusted. They submitted a clean [PR #${PR_NUM}: \"${PR_TITLE}\"](${PR_URL}). Set \`trusted: true\` in \`theme-authors.json\` to enable auto-merge."
              ;;
            needs_review)
              COLOR=16766720
              TITLE="PR Needs Manual Review — #${PR_NUM}"
              DESC="**@${PR_AUTHOR}** is a new contributor. They submitted a clean [PR #${PR_NUM}: \"${PR_TITLE}\"](${PR_URL}). Review and merge to register them."
              ;;
            *)
              exit 0
              ;;
          esac

          jq -n \
            --arg title "$TITLE" \
            --arg desc  "$DESC" \
            --argjson color "$COLOR" \
            --arg url   "$PR_URL" \
            '{"embeds":[{"title":$title,"description":$desc,"color":$color,"url":$url}]}' \
          | curl -s -X POST "$HOOK" -H "Content-Type: application/json" -d @-
