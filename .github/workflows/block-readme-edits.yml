name: Block README edits in PRs

on:
  pull_request:
    branches: [main]
    paths:
      - 'README.md'

jobs:
  block:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment and fail
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "## README.md edits are not allowed",
                "",
                "The `README.md` file is **auto-generated** from the theme files whenever a PR is merged into `main`.",
                "Please remove your changes to `README.md` and resubmit — your theme files are all that's needed.",
                "",
                "If something looks wrong in the README, fix the source theme file (e.g. the `.theme.css` metadata or `theme-authors.json`) instead."
              ].join("\n")
            });
            core.setFailed("README.md must not be modified in pull requests — it is auto-generated on merge.");
